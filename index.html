<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>TraceTheToxin</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#111;
color:white;
height:100vh;
display:flex;
flex-direction:column;
}

header{
padding:12px;
background:#181818;
border-bottom:1px solid #333;
}

header h1{
font-size:20px;
}

header p{
font-size:12px;
opacity:.8;
margin-top:3px;
}

.stats{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:13px;
}

#map{
flex:1;
}

.panel{
background:#181818;
padding:12px;
display:flex;
flex-direction:column;
gap:10px;
border-top:1px solid #333;
}

select,
input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background:#262626;
color:white;
}

button{
padding:14px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.report-btn{
background:#ff4b4b;
color:white;
}

.export-btn{
background:#00a7b5;
color:white;
}

.filters{
display:flex;
gap:6px;
overflow-x:auto;
}

.filter{
background:#303030;
color:white;
padding:10px;
border-radius:8px;
}

.leaflet-popup-content{
color:black;
}
</style>

</head>

<body>

<header>
<h1>TraceTheToxin</h1>
<p>Community Air Reporting Network</p>

<div class="stats">
<span id="reportCount">0 Reports</span>
<span id="updated">Loading...</span>
</div>
</header>

<div id="map"></div>

<div class="panel">

<select id="category">
<option>Chemical</option>
<option>Smoke</option>
<option>Sulfur</option>
<option>Sewage</option>
<option>Plastic</option>
<option>Dust</option>
<option>Unknown</option>
</select>

<input
id="comment"
type="text"
placeholder="Optional notes..."

>

<button class="report-btn" onclick="reportBadAir()">
⚠️ REPORT BAD AIR
</button>

<div class="filters">
<button class="filter" onclick="loadPins(1)">Today</button>
<button class="filter" onclick="loadPins(7)">7 Days</button>
<button class="filter" onclick="loadPins(30)">30 Days</button>
<button class="filter" onclick="loadPins(9999)">All Time</button>
</div>

<button class="export-btn" onclick="downloadCSV()">
Download CSV
</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
'https://YOUR-PROJECT.supabase.co';

const SUPABASE_KEY =
'YOUR_ANON_KEY';

const sb =
supabase.createClient(
SUPABASE_URL,
SUPABASE_KEY
);

const map =
L.map('map').setView([45.25,19.85],11);

L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{
attribution:'© OpenStreetMap'
}
).addTo(map);

let userCoords=null;
let userMarker=null;
let reportMarkers=[];

navigator.geolocation.watchPosition(

(position)=>{

userCoords={
lat:position.coords.latitude,
lon:position.coords.longitude
};

if(!userMarker){

userMarker=L.circleMarker(
[userCoords.lat,userCoords.lon],
{
radius:8,
color:'#00d0ff'
}
).addTo(map);

map.setView(
[userCoords.lat,userCoords.lon],
13
);

}else{

userMarker.setLatLng(
[userCoords.lat,userCoords.lon]
);

}

},

()=>{
alert('Location access required.');
},

{
enableHighAccuracy:true
}

);

function clearMarkers(){

reportMarkers.forEach(
m=>map.removeLayer(m)
);

reportMarkers=[];

}

async function loadPins(days=9999){

clearMarkers();

const cutoff=
new Date();

cutoff.setDate(
cutoff.getDate()-days
);

const {data,error}=await sb
.from('air_reports')
.select('*')
.order('created_at',{ascending:false});

if(error){
console.error(error);
return;
}

let visible=0;

data.forEach(report=>{

const reportDate=
new Date(report.created_at);

if(days!==9999 &&
reportDate<cutoff){
return;
}

visible++;

const popup=`
<b>⚠️ Air Report</b><br><br>

<b>Category:</b>
${report.category || 'Unknown'}<br>

<b>Date:</b>
${reportDate.toLocaleString()}<br>

<b>Wind:</b>
${report.wind_speed} km/h<br>

<b>Direction:</b>
${report.wind_direction}°<br>

<b>Pressure:</b>
${report.sea_level_pressure} hPa<br>

<b>Notes:</b>
${report.comment || 'None'}
`;

const marker=
L.marker([
report.latitude,
report.longitude
]).addTo(map);

marker.bindPopup(popup);

reportMarkers.push(marker);

});

document.getElementById(
'reportCount'
).innerText=
visible+' Reports';

document.getElementById(
'updated'
).innerText=
new Date().toLocaleTimeString();

}

async function reportBadAir(){

if(!userCoords){
alert('Waiting for GPS...');
return;
}

const category=
document.getElementById('category').value;

const comment=
document.getElementById('comment').value;

try{

const weather=
await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${userCoords.lat}&longitude=${userCoords.lon}&current=wind_speed_10m,wind_direction_10m,pressure_msl`
);

const weatherData=
await weather.json();

const current=
weatherData.current;

const {error}=await sb
.from('air_reports')
.insert([{

latitude:userCoords.lat,
longitude:userCoords.lon,

category:category,

wind_speed:
current.wind_speed_10m,

wind_direction:
current.wind_direction_10m,

sea_level_pressure:
current.pressure_msl,

comment:comment

}]);

if(error) throw error;

document.getElementById(
'comment'
).value='';

alert(
'Report submitted.'
);

loadPins();

}catch(err){

alert(err.message);

}

}

async function downloadCSV(){

const {data}=await sb
.from('air_reports')
.select('*');

if(!data || !data.length){
return;
}

let csv=
'ID,Date,Latitude,Longitude,Category,WindSpeed,WindDirection,Pressure,Comment\n';

data.forEach(r=>{

csv+=
`${r.id},${r.created_at},${r.latitude},${r.longitude},${r.category},${r.wind_speed},${r.wind_direction},${r.sea_level_pressure},"${r.comment || ''}"\n`;

});

const link=
document.createElement('a');

link.href=
encodeURI(
'data:text/csv;charset=utf-8,'+csv
);

link.download=
'TraceTheToxin.csv';

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

}

loadPins();

setInterval(
()=>loadPins(),
60000
);

</script>

</body>
</html>
