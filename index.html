// 1. Populate Time Dropdown
function populateTimeOptions() {
  const select = document.getElementById('reportTime');
  const intervals = ['00', '15', '30', '45'];
  for (let h = 0; h < 24; h++) {
    const hour = String(h).padStart(2, '0');
    intervals.forEach(min => {
      const timeVal = `${hour}:${min}`;
      const opt = document.createElement('option');
      opt.value = timeVal; opt.textContent = timeVal;
      select.appendChild(opt);
    });
  }
}

// 2. Validate Wind Input Range
function validateRange(input) {
  let val = parseFloat(input.value);
  if (isNaN(val)) { input.value = ""; }
  else {
    if (val < 0) input.value = 0;
    if (val > 360) input.value = 360;
  }
  checkFormReady();
}

// 3. Updated checkFormReady
function checkFormReady() {
  const category = document.getElementById('category').value;
  const intensity = document.getElementById('intensity').value;
  const time = document.getElementById('reportTime').value;
  const wind = document.getElementById('manualWind').value;
  const hasLoc = !!(userCoords || manualCoords);
  
  const windVal = parseFloat(wind);
  const isWindValid = wind !== "" && windVal >= 0 && windVal <= 360;
  
  const btn = document.getElementById('reportBtn');
  btn.disabled = !(category && intensity && time && isWindValid && hasLoc);
}

// Initialize on load
populateTimeOptions();

function initTimeInput() {
  const now = new Date();
  const mins = now.getMinutes();
  const roundedMins = Math.round(mins / 15) * 15;
  now.setMinutes(roundedMins);
  
  const timeInput = document.getElementById('reportTime');
  // Formats to HH:MM
  timeInput.value = now.toTimeString().slice(0, 5); 
}
initTimeInput();

let lastSyncTimestamp = new Date().toISOString();

async function checkForNewReports() {
  // Query only records newer than our last sync
  const { data, error } = await sb
    .from('air_reports')
    .select('*')
    .gt('created_at', lastSyncTimestamp)
    .order('created_at', { ascending: false });

  if (error) {
    console.error("Error checking for updates:", error);
    return;
  }

  if (data && data.length > 0) {
    console.log(`Found ${data.length} new reports. Updating...`);
    
    // Update our sync timestamp to the newest record found
    lastSyncTimestamp = data[0].created_at;
    
    // Merge new data and reload
    globalActiveData = [...data, ...globalActiveData];
    loadPinsByWindow();
  }
}

function enableManualPinMode() {
  // If not already in pin mode, enable it
  if (!pinMode) {
    togglePinMode(); 
  }
  
  // Center map and place the manual pin
  const center = map.getCenter();
  manualCoords = { lat: center.lat, lon: center.lng };
  
  if (manualMarker) {
    manualMarker.setLatLng(center);
  } else {
    manualMarker = L.marker(center, {
      icon: L.divIcon({
        className: '',
        html: `<div style="width:20px;height:20px;background:#f5a623;border-radius:50%;border:2px solid white;box-shadow:0 3px 8px rgba(0,0,0,0.4)"></div>`,
        iconAnchor: [10, 10]
      })
    }).addTo(map);
  }
  checkFormReady();
}

function startWatching() {
  navigator.geolocation.getCurrentPosition(
    pos => {
      userCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude };
      hideGpsModal();
      
      // Only show the user's blue dot if we have a position
      if (!userMarker) {
        userMarker = L.circleMarker([userCoords.lat, userCoords.lon], {
          radius: 8, color: '#00d0ff', fillColor: '#00d0ff', fillOpacity: .85, weight: 2
        }).addTo(map);
        map.setView([userCoords.lat, userCoords.lon], 13);
      }
      checkFormReady();
      evaluateActiveNearbyClusters();
    },
    err => {
      // If GPS fails, switch to manual mode automatically
      showGpsModal();
      enableManualPinMode();
    },
    { enableHighAccuracy: true, timeout: 12000 }
  );
}

function initGps() {
  if (!navigator.geolocation) {
    enableManualPinMode();
    return;
  }

  // Check permission state directly
  navigator.permissions.query({ name: 'geolocation' }).then(result => {
    if (result.state === 'denied') {
      showGpsModal();
      enableManualPinMode();
    } else {
      startWatching();
    }
  }).catch(() => {
    // If permissions API not supported, just try to get the position
    startWatching();
  });
}

/**
 * Consolidated Weather Fetcher
 * Fetches data from Open-Meteo with built-in timeout and error handling.
 */
// Helper to keep the degrees within 0-360 without corrupting the value
function getProcessedWindDirection(rawDegrees) {
  if (rawDegrees == null) return 0;
  return (parseFloat(rawDegrees) % 360 + 360) % 360;
}

async function getWeatherData(lat, lng, datetime = null) {
  const TIMEOUT_MS = 6000;
  
  const isHistorical = datetime && new Date(datetime).getTime() < (Date.now() - 24 * 60 * 60 * 1000);
  
  const baseURL = isHistorical 
    ? 'https://archive-api.open-meteo.com/v1/archive' 
    : 'https://api.open-meteo.com/v1/forecast';

  const queryParams = isHistorical 
    ? `?latitude=${lat}&longitude=${lng}&start_date=${datetime.split('T')[0]}&end_date=${datetime.split('T')[0]}&hourly=wind_speed_10m,wind_direction_10m,pressure_msl`
    : `?latitude=${lat}&longitude=${lng}&current=wind_speed_10m,wind_direction_10m,pressure_msl&timezone=auto&models=icon_d2`;
  const controller = new AbortController();

  const timeoutId = setTimeout(() => controller.abort(), TIMEOUT_MS);

  try {
    const response = await fetch(baseURL + queryParams, { signal: controller.signal });
    clearTimeout(timeoutId);

    if (!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();

    let windSpeed, windDirection, pressure;
    
    if (data.current) {
      ({ wind_speed_10m: windSpeed, wind_direction_10m: windDirection, pressure_msl: pressure } = data.current);
    } else if (data.hourly) {
      const hourIndex = datetime ? new Date(datetime).getHours() : 0;
      windSpeed = data.hourly.wind_speed_10m[hourIndex];
      windDirection = data.hourly.wind_direction_10m[hourIndex];
      pressure = data.hourly.pressure_msl[hourIndex];
    }

    return {
      wind_speed: windSpeed != null ? parseFloat(windSpeed.toFixed(1)) : 0,
      // Removed Math.round, kept 2 decimals for precision
      wind_direction: windDirection != null ? parseFloat(getProcessedWindDirection(windDirection).toFixed(2)) : 0,
      sea_level_pressure: pressure != null ? parseFloat(pressure.toFixed(1)) : null,
      source: isHistorical ? "Open-Meteo Archive" : "Open-Meteo Current"
    };

  } catch (error) {
    console.error("Weather Fetch Error:", error.message);
    return { wind_speed: 0, wind_direction: 0, sea_level_pressure: null, source: "Offline/Default" };
  }
}

async function triggerWindUpdate() {
  if (typeof manualCoords === 'undefined' || !manualCoords) return;
  
  // Fetch new data
  const weather = await getWeatherData(manualCoords.lat, manualCoords.lon);
  
  // Update your global variables or UI here
  console.log("Updated Wind:", weather);
  
  // Example: If you have a global state
  currentWeatherData = weather;
  
  // Update your marker/UI if needed
  if (typeof updateWindMarker === 'function') {
    updateWindMarker(weather.wind_direction);
  }
}

function getProcessedWindDirection(rawDegrees) {
  if (rawDegrees == null) return 0;
  
  // Ensure the value stays within 0-360 range
  let deg = parseFloat(rawDegrees);
  return (deg % 360 + 360) % 360;
}

function ageColor(createdAt){
  const h=(Date.now()-new Date(createdAt))/3600000;
  if(h<1)   return '#a32222'; 
  if(h<2)   return '#a33822'; 
  if(h<6)   return '#a34d22'; 
  if(h<12)  return '#a36322'; 
  if(h<24)  return '#a37822'; 
  if(h<48)  return '#a1a1a1'; 
  return     '#333333';        
}

function degToCardinal(deg){
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];
}

function getHaversineDistance(lat1, lon1, lat2, lon2) {
  const R = 6371; 
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

function smoothPathChaikin(points, iterations = 3) {
  if (points.length < 3) return points;
  let current = [...points];
  
  for (let iter = 0; iter < iterations; iter++) {
    const nextArr = [];
    nextArr.push(current[0]); 
    
    for (let i = 0; i < current.length - 1; i++) {
      const p0 = current[i];
      const p1 = current[i + 1];
      
      const q = {
        lat: p0.lat * 0.75 + p1.lat * 0.25,
        lon: p0.lon * 0.75 + p1.lon * 0.25
      };
      const r = {
        lat: p0.lat * 0.25 + p1.lat * 0.75,
        lon: p0.lon * 0.25 + p1.turn || p1.lon * 0.75
      };
      r.lon = p0.lon * 0.25 + p1.lon * 0.75;
      
      nextArr.push(q);
      nextArr.push(r);
    }
    nextArr.push(current[current.length - 1]);
    current = nextArr;
  }
  return current;
}

function moveUpwind(lat,lon,windFromDeg,distKm){
  const R=6371, br=(windFromDeg*Math.PI)/180, d=distKm/R;
  const lat1=lat*Math.PI/180, lon1=lon*Math.PI/180;
  const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(br));
  const lon2=lon1+Math.atan2(Math.sin(br)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
  return { lat:lat2*180/Math.PI, lon:lon2*180/Math.PI };
}

async function fetchHistoricWind(lat,lon,isoStart,isoEnd){
  const cacheKey = `${lat.toFixed(3)}_${lon.toFixed(3)}_${isoStart.slice(0,13)}`;
  if(weatherCache[cacheKey]) return weatherCache[cacheKey];

  const daysDiff=(Date.now()-new Date(isoStart))/86400000;
  let url = '';
  if(daysDiff<7){
    url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kmh&timezone=auto&past_days=7&forecast_days=1`;
  } else {
    const sd=isoStart.slice(0,10), ed=isoEnd.slice(0,10);
    url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${sd}&end_date=${ed}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kmh&timezone=auto`;
  }
  
  try {
    const r=await fetch(url); 
    const d=await r.json(); 
    weatherCache[cacheKey] = d.hourly;
    return d.hourly;
  } catch(e) {
    return null;
  }
}

function buildRawVectorTrail(baseLat, baseLon, steps, pinSpeed = null, pinDir = null) {
  const trail = [{ lat: baseLat, lon: baseLon }];
  let cLat = baseLat, cLon = baseLon;
  
  steps.forEach((s, idx) => {
    const useDir = (idx === 0 && pinDir !== null) ? pinDir : s.dir;
    const useSpd = (idx === 0 && pinSpeed !== null) ? pinSpeed : s.spd;
    
    const m = moveUpwind(cLat, cLon, useDir, useSpd * 1.0);
    cLat = m.lat; cLon = m.lon;
    trail.push({ lat: cLat, lon: cLon });
  });
  
  return trail;
}

function computePlumeEnvelopeRing(smoothedSpine, expansionAngleDeg = 6) {
  const leftBoundCoords = [];
  const rightBoundCoords = [];
  const lastPoint = smoothedSpine[smoothedSpine.length - 1];

  smoothedSpine.forEach((point, index) => {
    // Calculate the bearing at this specific point to determine width
    const prev = (index === 0) ? point : smoothedSpine[index - 1];
    const dy = point.lat - prev.lat;
    const dx = (point.lon - prev.lon) * Math.cos(point.lat * Math.PI / 180);
    const baseBearingRad = Math.atan2(dx, dy);
    
    const progressFactor = index / smoothedSpine.length;
    const spreadDistance = 0.04 * progressFactor; 

    // Create boundaries
    const leftLat = point.lat + Math.cos(baseBearingRad - Math.PI/2) * spreadDistance;
    const leftLon = point.lon + (Math.sin(baseBearingRad - Math.PI/2) * spreadDistance) / Math.cos(point.lat * Math.PI / 180);
    
    const rightLat = point.lat + Math.cos(baseBearingRad + Math.PI/2) * spreadDistance;
    const rightLon = point.lon + (Math.sin(baseBearingRad + Math.PI/2) * spreadDistance) / Math.cos(point.lat * Math.PI / 180);

    leftBoundCoords.push([leftLat, leftLon]);
    rightBoundCoords.unshift([rightLat, rightLon]);
  });

  // --- ADDING THE SEMI-CIRCLE CAP ---
  const lastWidth = 0.02; // Matches the max spreadDistance at the end
  const arcPoints = [];
  const numArcPoints = 6; // Adjust for smoothness
  
  // Calculate angle of the last segment to center the arc
  const p1 = smoothedSpine[smoothedSpine.length - 2];
  const p2 = smoothedSpine[smoothedSpine.length - 1];
  const angle = Math.atan2(p2.lon - p1.lon, p2.lat - p1.lat);

  for (let i = 0; i <= numArcPoints; i++) {
    // Sweep from -PI/2 to PI/2 relative to the trajectory direction
    const sweep = (i / numArcPoints) * Math.PI - Math.PI/2;
    const arcLat = lastPoint.lat + Math.cos(angle + sweep) * lastWidth;
    const arcLon = lastPoint.lon + Math.sin(angle + sweep) * lastWidth / Math.cos(lastPoint.lat * Math.PI / 180);
    arcPoints.push([arcLat, arcLon]);
  }

  // Combine: Left side -> Arc Cap -> Right side
  return leftBoundCoords.concat(arcPoints, rightBoundCoords);
}

async function renderBackgroundTrailForReport(report) {

async function startBacktrack(lat, lon, createdAt) {
  clearBacktrack();
  const HOURS = 6;
  
  // Define variables here, at the top level of the function
  const reportTime = new Date(createdAt);
  const startTime = new Date(reportTime.getTime() - HOURS * 3600000);

  try {
    const matchedReport = globalActiveData.find(r => 
      Math.abs(parseFloat(r.latitude) - parseFloat(lat)) < 0.00001 && 
      Math.abs(parseFloat(r.longitude) - parseFloat(lon)) < 0.00001
    );
    
    const pinSpd = matchedReport ? parseFloat(matchedReport.wind_speed) : parseFloat(liveTrackedWindSpeed);
    const pinDir = matchedReport ? parseFloat(matchedReport.wind_direction) : parseFloat(liveTrackedWindDir);
    
    // Now startTime is guaranteed to be defined
    const hourly = await fetchHistoricWind(lat, lon, startTime.toISOString(), reportTime.toISOString());
    if (!hourly?.time?.length) return;

    const steps = [];
    for(let i = hourly.time.length - 1; i >= 0; i--) {
      const ts = new Date(hourly.time[i]);
      if(ts >= startTime && ts <= reportTime)
        steps.push({ spd: hourly.wind_speed_10m[i], dir: hourly.wind_direction_10m[i] });
    }
    
    if(!steps.length) return;

    // ... [rest of your existing logic remains the same]
  } catch(err) { 
    console.error('Backtrack Error:', err); 
  }
}

async function generateAllBackgroundTrails(reports) {
  clearBackgroundTrails();

  // Create a shallow copy and sort it so that older reports are drawn first, 
  // and the newest reports are drawn LAST (putting them on top visually)
  const sortedReports = [...reports].sort((a, b) => new Date(a.created_at) - new Date(b.created_at));

  const trailPromises = sortedReports.map(async (report) => {
    const startLat = parseFloat(report.latitude);
    const startLon = parseFloat(report.longitude);
    const windDeg = parseFloat(report.wind_direction);
    
    const totalDistKm = 10; // Total plume reach length
    const totalSegments = 3; 
    const stepDistKm = totalDistKm / totalSegments;
    const expansionAngleDeg = 15; // Set crisp wedge expansion angle spread
    
    const baseColor = ageColor(report.created_at);

    // Calculate the general opposite upwind heading angle in radians
    const upwindBearingRad = ((windDeg + 180) % 360) * Math.PI / 180;

    for (let i = 0; i < totalSegments; i++) {
      const currentSegmentDistStart = i * stepDistKm;
      const currentSegmentDistEnd = (i + 1) * stepDistKm;

      const pStart = moveUpwind(startLat, startLon, windDeg, currentSegmentDistStart);
      const pEnd = moveUpwind(startLat, startLon, windDeg, currentSegmentDistEnd);

      const widthStart = currentSegmentDistStart * Math.sin(expansionAngleDeg * Math.PI / 180);
      const widthEnd = currentSegmentDistEnd * Math.sin(expansionAngleDeg * Math.PI / 180);

      const leftAngle = upwindBearingRad - Math.PI / 2;
      const rightAngle = upwindBearingRad + Math.PI / 2;

      const cosStartLat = Math.cos(pStart.lat * Math.PI / 180);
      const cosEndLat = Math.cos(pEnd.lat * Math.PI / 180);

      const pStartLeftLat = pStart.lat + (Math.cos(leftAngle) * widthStart) / 111.32;
      const pStartLeftLon = pStart.lon + (Math.sin(leftAngle) * widthStart) / (111.32 * cosStartLat);

      const pStartRightLat = pStart.lat + (Math.cos(rightAngle) * widthStart) / 111.32;
      const pStartRightLon = pStart.lon + (Math.sin(rightAngle) * widthStart) / (111.32 * cosStartLat);

      const pEndLeftLat = pEnd.lat + (Math.cos(leftAngle) * widthEnd) / 111.32;
      const pEndLeftLon = pEnd.lon + (Math.sin(leftAngle) * widthEnd) / (111.32 * cosEndLat);

      const pEndRightLat = pEnd.lat + (Math.cos(rightAngle) * widthEnd) / 111.32;
      const pEndRightLon = pEnd.lon + (Math.sin(rightAngle) * widthEnd) / (111.32 * cosEndLat);

      const segmentEnvelope = [
        [pStartLeftLat, pStartLeftLon],
        [pEndLeftLat, pEndLeftLon],
        [pEndRightLat, pEndRightLon],
        [pStartRightLat, pStartRightLon]
      ];

      const segmentFactor = i / totalSegments; 
      const segmentFillOpacity = 0.35 * (1.0 - segmentFactor); 
      const segmentStrokeOpacity = 0.15 * (1.0 - segmentFactor);

      const coneSegment = L.polygon(segmentEnvelope, {
        color: baseColor,
        fillColor: baseColor,
        weight: 1,
        fillOpacity: segmentFillOpacity,
        opacity: segmentStrokeOpacity,
        className: 'bg-trail-teal',
        interactive: false
      }).addTo(map);

      bgTrailLayers.push(coneSegment);
    }
  });

  await Promise.all(trailPromises);
}

   CROWD VALIDATION & CLUSTERING ENGINE
═══════════════════════════════════════════════════ */
function evaluateActiveNearbyClusters() {
  const currentLoc = pinMode && manualCoords ? manualCoords : userCoords;
  if (!currentLoc || !globalActiveData.length) {
    return;
  }

  const now = Date.now();
  const CLUSTER_RADIUS_KM = 3.0;
  const CLUSTER_TIME_WINDOW_MS = 2 * 3600 * 1000; 

  const candidateReports = globalActiveData.filter(r => {
    const ageMs = now - new Date(r.created_at).getTime();
    if (ageMs > CLUSTER_TIME_WINDOW_MS) return false;
    
    const distance = getHaversineDistance(currentLoc.lat, currentLoc.lon, r.latitude, r.longitude);
    return distance <= CLUSTER_RADIUS_KM;
  });

  if (!candidateReports.length) {
    return;
  }

  const categoryCounts = {};
  candidateReports.forEach(r => {
    categoryCounts[r.category] = (categoryCounts[r.category] || 0) + 1;
  });

  let topCategory = '';
  let maxCount = 0;
  for (const cat in categoryCounts) {
    if (categoryCounts[cat] > maxCount) {
      maxCount = categoryCounts[cat];
      topCategory = cat;
    }
  }

  if (maxCount >= 2) {
    console.log(`Active community cluster detected for category: ${topCategory} (${maxCount} reports)`);
  }
}

/* ═══════════════════════════════════════════════════
   HIGH-PRECISION SPLINE SEGMENT INTERCEPT TRACER
═══════════════════════════════════════════════════ */
let activeTraceRequestId = 0;

function distanceToSegment(p, p1, p2) {
  const R = 6371; // Earth's radius in km
  const latMid = (p1.lat + p2.lat) / 2 * Math.PI / 180;
  const cosLat = Math.cos(latMid);
  
  const x = p.lon * cosLat;
  const y = p.lat;
  const x1 = p1.lon * cosLat;
  const y1 = p1.lat;
  const x2 = p2.lon * cosLat;
  const y2 = p2.lat;
  
  const dx = x2 - x1;
  const dy = y2 - y1;
  const l2 = dx * dx + dy * dy;
  
  let tVal = 0;
  if (l2 > 0) {
    tVal = ((x - x1) * dx + (y - y1) * dy) / l2;
    tVal = Math.max(0, Math.min(1, tVal));
  }
  
  const closestLat = y1 + tVal * dy;
  const closestLon = (x1 + tVal * dx) / cosLat;
  
  const dLat = (p.lat - closestLat) * Math.PI / 180;
  const dLon = (p.lon - closestLon) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(closestLat*Math.PI/180) * Math.cos(p.lat*Math.PI/180) * Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

async function filterPinsBySourceTrajectory(tracerCoords) {
  activeTraceRequestId++;
  const currentRequestId = activeTraceRequestId;

  clearMarkers();
  tracerVisualCircles.forEach(c => map.removeLayer(c));
  tracerVisualCircles = [];

  const activeReportsToDrawTrails = [];
  const BASE_RADIUS_KM = 0.5; // Constant baseline radius near the pin origin

  // Checks the entire historical record in globalActiveData completely
  const evaluationPromises = globalActiveData.map(async (report, index) => {
    const startLat = parseFloat(report.latitude);
    const startLon = parseFloat(report.longitude);
    const windDeg = parseFloat(report.wind_direction);

    // Completely aligned with your updated 3-segment mobile optimized layout
    const totalDistKm = 20;
    const totalSegments = 3; 
    const stepDistKm = totalDistKm / totalSegments;
    const expansionAngleDeg = 25; 

    const trailCoordinates = [{ lat: startLat, lon: startLon }];
    for (let i = 1; i <= totalSegments; i++) {
      trailCoordinates.push(moveUpwind(startLat, startLon, windDeg, i * stepDistKm));
    }

    let matchFound = false;

    // Loop through each piece of the spine trail line
    for (let i = 0; i < trailCoordinates.length - 1; i++) {
      const p1 = trailCoordinates[i];
      const p2 = trailCoordinates[i + 1];

      // Measure the perpendicular distance from the click point to this segment
      const distanceKM = distanceToSegment(tracerCoords, p1, p2);

      // The further upwind the segment goes, the wider the acceptable search radius grows
      const segmentDistanceTravelled = i * stepDistKm;
      const coneExpansionWidth = segmentDistanceTravelled * Math.sin(expansionAngleDeg * Math.PI / 180);
      const dynamicMaxAllowedDistance = BASE_RADIUS_KM + coneExpansionWidth;

      if (distanceKM <= dynamicMaxAllowedDistance) {
        matchFound = true;
        
        // Render helper diagnostic target halos showing the matched region width
        const dispersionIndicator = L.circle([p1.lat, p1.lon], {
          radius: dynamicMaxAllowedDistance * 1000,
          color: '#ff8800',
          fillColor: 'transparent',
          weight: 1,
          dashArray: '5, 5',
          opacity: 0.3,
          interactive: false
        })
        tracerVisualCircles.push(dispersionIndicator);
        break;
      }
    }

    return matchFound ? { report, index } : null;
  });

  const results = await Promise.all(evaluationPromises);
  if (currentRequestId !== activeTraceRequestId) return;

  results.forEach(res => {
    if (res) {
      renderPin(res.report, res.index);
      activeReportsToDrawTrails.push(res.report);
    }
  });

  generateAllBackgroundTrails(activeReportsToDrawTrails);

  const n = reportMarkers.length;
  const rcEl = document.getElementById('reportCount');
  if (rcEl) rcEl.textContent = n + ' ' + (n === 1 ? t('reportCount1') : t('reportCount'));
}
