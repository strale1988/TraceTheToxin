*{ margin:0; padding:0; box-sizing:border-box; }

body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#111;
  color:white;

  display:flex;
  flex-direction:column;

header{

  background:#181818;
  border-bottom:1px solid #333;
}

.header-top{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
}

header h1{ font-size:19px; }
header p{ font-size:11px; opacity:.7; margin-top:2px; }

.stats{
  display:flex;
  justify-content:space-between;
  margin-top:8px;
  font-size:12px;
  opacity:.8;
}

.lang-toggle{
  display:flex;
  gap:4px;
  align-items:center;
  flex-shrink:0;
}

.lang-btn{
  background:#303030;
  color:#aaa;
  border:none;
  border-radius:6px;
  padding:5px 8px;
  font-size:11px;
  font-weight:600;
  cursor:pointer;
  transition:background .15s,color .15s;
}
.lang-btn.active{ background:#00a7b5; color:white; }

#map{ flex:1; position:relative; }

/* ── Panel ────────────────────────────────────────── */
.panel{
  background:#181818;
  padding:10px 12px;
  display:flex;
  flex-direction:column;
  gap:8px;
  border-top:1px solid #333;
}

.row{
  display:flex;
  gap:8px;
}

select{
  flex:1;
  padding:11px 10px;
  border:none;
  border-radius:8px;
  background:#262626;
  color:white;
  font-size:13px;
}

input{
  width:100%;
  padding:11px 10px;
  border:none;
  border-radius:8px;
  background:#262626;
  color:white;
  font-size:13px;
}

button{
  padding:12px;
  border:none;
  border-radius:8px;

  font-weight:bold;
  font-size:13px;
}

.report-btn{ background:#ff4b4b; color:white; width:100%; }
.export-btn{ background:#00a7b5; color:white; width:100%; }

/* Legend */
.legend{
  display:flex;
  gap:10px;
  font-size:10px;
  align-items:center;
  flex-wrap:wrap;
  opacity:.8;
}
.legend-item{ display:flex; align-items:center; gap:3px; }
.legend-dot{ width:9px; height:9px; border-radius:50%; display:inline-block; }

/* ── Popup styles ─────────────────────────────────── */
.leaflet-popup-content-wrapper{
  border-radius:10px !important;
  padding:0 !important;
  overflow:hidden;
  min-width:200px;
}
.leaflet-popup-content{
  margin:0 !important;
  width:auto !important;
}

.popup-inner{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  font-size:13px;
  line-height:1.65;

  min-width:200px;

.popup-inner b{ color:#222; }
.popup-title{
  font-size:14px;
  font-weight:700;
  margin-bottom:8px;
  color:#111;
}

/* ── Compass (map control) ────────────────────────── */
.compass-wrap{
  background:rgba(20,20,20,.88);
  border-radius:50%;
  width:56px;
  height:56px;
  display:flex;
  align-items:center;
  justify-content:center;

/* ── Manual pin map button (bottom-left) ──────────── */

    listenOrientation();
  }
}

function listenOrientation(){
  window.addEventListener('deviceorientationabsolute', handleOrientation, true);
  window.addEventListener('deviceorientation',         handleOrientation, true);
}
function handleOrientation(e){
  let h = null;
  if(e.absolute && e.alpha!==null) h=(360-e.alpha)%360;
  else if(e.webkitCompassHeading!==undefined) h=e.webkitCompassHeading;
  if(h!==null) updateCompassNeedle(h);
}

/* ═══════════════════════════════════════════════════
   LIVE WIND at GPS dot
═══════════════════════════════════════════════════ */
let liveWindMarker = null;

async function fetchLiveWind(lat,lon){
  try{
    const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=wind_speed_10m,wind_direction_10m`);
    const d = await r.json();
    const spd  = d.current.wind_speed_10m;
    const dir  = d.current.wind_direction_10m;
    const card = degToCardinal(dir);
    const rot  = (dir+180)%360;   // arrow points TO direction

    const html = `<div class="wind-bubble">
      <div style="font-size:16px;transform:rotate(${rot}deg);line-height:1;margin-bottom:2px">↑</div>
      <div>${spd} km/h</div>
      <div style="font-size:10px;opacity:.85">${dir}° ${card}</div>
    </div>`;

    const icon = L.divIcon({ className:'', html, iconAnchor:[-6,10] });
    if(!liveWindMarker){
      liveWindMarker = L.marker([lat,lon],{ icon, zIndexOffset:900, interactive:false }).addTo(map);
    } else {
      liveWindMarker.setLatLng([lat,lon]);
      liveWindMarker.setIcon(icon);
    }
  } catch(e){ console.warn('Wind fetch:',e); }
}

function startWindWhenReady(){
  if(userCoords){
    fetchLiveWind(userCoords.lat, userCoords.lon);
    setInterval(()=>{ if(userCoords) fetchLiveWind(userCoords.lat,userCoords.lon); }, 5*60*1000);
  } else {
    setTimeout(startWindWhenReady, 1000);
  }
}

function ageColor(createdAt){
  const h = (Date.now()-new Date(createdAt))/3600000;
  if(h<1)  return '#ff4b4b';
  if(h<6)  return '#e07a00';
  if(h<24) return '#888888';
  return '#555555';
}

function degToCardinal(deg){
  return ['N','NE','E','SE','S','SW','W','NW'][Math.round(deg/45)%8];
}

function makeIcon(color, windDeg){
  const rot = windDeg!==undefined ? (windDeg+180)%360 : null;
  const arrow = rot!==null ? `
    <g transform="translate(14,14) rotate(${rot})">
      <line x1="0" y1="7" x2="0" y2="-7" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
      <polygon points="0,-9 -2.5,-5 2.5,-5" fill="white"/>
    </g>` : '';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="28" height="36" viewBox="0 0 28 36">
    <path d="M14 0C6.27 0 0 6.27 0 14c0 9.63 14 22 14 22S28 23.63 28 14C28 6.27 21.73 0 14 0z"
          fill="${color}" stroke="rgba(0,0,0,.35)" stroke-width="1.5"/>
    ${arrow}
  </svg>`;
  return L.divIcon({ className:'', html:svg, iconSize:[28,36], iconAnchor:[14,36], popupAnchor:[0,-38] });
}

/* ═══════════════════════════════════════════════════
   BACKTRACK ENGINE
═══════════════════════════════════════════════════ */
let btLayers   = [];
let btAnimFrame= null;

function clearBacktrack(){
  btLayers.forEach(l=>map.removeLayer(l));
  btLayers=[];
  if(btAnimFrame){ cancelAnimationFrame(btAnimFrame); btAnimFrame=null; }
}

function moveUpwind(lat,lon,windFromDeg,distKm){
  // go toward the source = travel in windFromDeg direction (upwind)
  const R=6371, brRad=(windFromDeg*Math.PI)/180, d=distKm/R;
  const lat1=lat*Math.PI/180, lon1=lon*Math.PI/180;
  const lat2=Math.asin(Math.sin(lat1)*Math.cos(d)+Math.cos(lat1)*Math.sin(d)*Math.cos(brRad));
  const lon2=lon1+Math.atan2(Math.sin(brRad)*Math.sin(d)*Math.cos(lat1),Math.cos(d)-Math.sin(lat1)*Math.sin(lat2));
  return { lat:lat2*180/Math.PI, lon:lon2*180/Math.PI };
}

async function fetchHistoricWind(lat,lon,isoStart,isoEnd){
  const daysDiff=(Date.now()-new Date(isoStart))/86400000;
  if(daysDiff<7){
    // recent: use forecast past_days endpoint (no archive lag)
    const url=`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kmh&timezone=auto&past_days=7&forecast_days=1`;
    const r=await fetch(url); const d=await r.json(); return d.hourly;
  }
  const sd=isoStart.slice(0,10), ed=isoEnd.slice(0,10);
  const url=`https://archive-api.open-meteo.com/v1/archive?latitude=${lat}&longitude=${lon}&start_date=${sd}&end_date=${ed}&hourly=wind_speed_10m,wind_direction_10m&wind_speed_unit=kmh&timezone=auto`;
  const r=await fetch(url); const d=await r.json(); return d.hourly;
}

async function startBacktrack(lat,lon,createdAt,hours=12){
  clearBacktrack();
  try{
    const reportTime=new Date(createdAt);
    const startTime=new Date(reportTime.getTime()-hours*3600000);
    const hourly=await fetchHistoricWind(lat,lon,startTime.toISOString(),reportTime.toISOString());

    if(!hourly?.time?.length){ console.warn('No wind data'); return; }

    // collect steps newest-first (we walk backward from pin)
    const steps=[];
    for(let i=hourly.time.length-1;i>=0;i--){
      const ts=new Date(hourly.time[i]);
      if(ts>=startTime && ts<=reportTime)
        steps.push({ spd:hourly.wind_speed_10m[i], dir:hourly.wind_direction_10m[i] });
    }
    if(!steps.length){ console.warn('Steps empty'); return; }

    // build trail from pin backward
    const trail=[{lat,lon}];
    let cLat=lat,cLon=lon;
    for(const s of steps){
      const moved=moveUpwind(cLat,cLon,s.dir,s.spd*1);
      cLat=moved.lat; cLon=moved.lon;
      trail.push({lat:cLat,lon:cLon});
    }

    const latlngs=trail.map(p=>[p.lat,p.lon]);
    // NOTE: trail[0] = pin (report location), trail[last] = estimated source
    // Dashes animate FROM source TOWARD pin (index goes last→first visually via dashOffset++)
    // We reverse latlngs for the animated layer so the flow goes source→pin

    // pale underline
    const under=L.polyline(latlngs,{ color:'#ff8800',weight:4,opacity:.2 }).addTo(map);
    btLayers.push(under);

    // animated dashed overlay — reversed so animation flows toward pin
    const dashedLine=L.polyline([...latlngs].reverse(),{
      color:'#ff8800', weight:3, opacity:.9, dashArray:'10 7'
    }).addTo(map);
    btLayers.push(dashedLine);

    // animate: decrease dashOffset → dashes flow from pin toward source
    let offset=0;
    function anim(){
      offset=(offset-0.4+1000)%17;
      const el=dashedLine.getElement();
      if(el) el.style.strokeDashoffset=offset;
      btAnimFrame=requestAnimationFrame(anim);
    }
    anim();

    // hourly dots (skip first=pin, skip last=source, show intermediates)
    trail.slice(1,-1).forEach(p=>{
      const dot=L.circleMarker([p.lat,p.lon],{
        radius:3.5, color:'#ff8800', fillColor:'#fff', fillOpacity:.9, weight:1.5
      }).addTo(map);
      btLayers.push(dot);
    });

    // source circle
    const srcCircle=L.circleMarker([cLat,cLon],{
      radius:12, color:'#ff8800', fillColor:'#ff8800', fillOpacity:.2, weight:2.5
    }).addTo(map);
    btLayers.push(srcCircle);

    // source label — proper size, fully inside popup
    const srcIcon=L.divIcon({
      className:'',
      html:`<div class="source-label">
        ${t('possSource')}<br>
        <span style="font-size:10px;opacity:.85;font-weight:600">${hours}h ${t('backtrack')}</span>
      </div>`,
      iconAnchor:[0,10]
    });
    const srcMarker=L.marker([cLat,cLon],{icon:srcIcon,interactive:false}).addTo(map);
    btLayers.push(srcMarker);

  } catch(err){ console.error('Backtrack error:',err); }
}

/* ═══════════════════════════════════════════════════
   PINS
═══════════════════════════════════════════════════ */
function clearMarkers(){
  reportMarkers.forEach(m=>map.removeLayer(m));
  reportMarkers=[];
}

function renderPin(report){
  const date  = new Date(report.created_at);
  const color = ageColor(report.created_at);
  const card  = degToCardinal(report.wind_direction);
  const rot   = (report.wind_direction+180)%360; // arrow to direction

  const popupHtml=`<div class="popup-inner">
<div class="popup-title">${t('popupTitle')}</div>
<b>${t('popupCat')}:</b> ${report.category||'Unknown'}<br>
<b>${t('popupDate')}:</b> ${date.toLocaleString()}<br>
<b>${t('popupWind')}:</b> ${report.wind_speed} km/h<br>
<b>${t('popupDir')}:</b> ${report.wind_direction}° ${card}
  <span style="display:inline-block;transform:rotate(${rot}deg);font-size:15px;line-height:1;vertical-align:middle">↑</span><br>
<b>${t('popupPres')}:</b> ${report.sea_level_pressure} hPa<br>
<b>${t('popupNotes')}:</b> ${report.comment||t('popupNone')}
</div>`;

  const marker=L.marker([report.latitude,report.longitude],{
    icon:makeIcon(color,report.wind_direction)
  }).addTo(map);

  marker.bindPopup(popupHtml,{ maxWidth:240, minWidth:200 });

  // auto-trigger 12h backtrack on open; trail persists after close
  marker.on('popupopen', ()=>{
    startBacktrack(report.latitude, report.longitude, report.created_at, 12);
  });

  reportMarkers.push(marker);
}

/* ═══════════════════════════════════════════════════
   LOAD PINS
═══════════════════════════════════════════════════ */
async function loadPins(days){
  if(days!==undefined) currentDays=days;
  clearMarkers();
  clearBacktrack();

  const cutoff=new Date();
  cutoff.setDate(cutoff.getDate()-currentDays);

  const {data,error}=await sb.from('air_reports').select('*').order('created_at',{ascending:false});
  if(error){ console.error(error); return; }

  let n=0;
  data.forEach(r=>{
    if(currentDays!==9999 && new Date(r.created_at)<cutoff) return;
    n++; renderPin(r);
  });
  document.getElementById('reportCount').textContent=n+' '+t('reportCount');
  document.getElementById('updated').textContent=new Date().toLocaleTimeString();
}

async function loadPinsByHours(hours){
  if(hours!==undefined) currentHours=hours;
  clearMarkers();
  clearBacktrack();

  const cutoff=new Date(Date.now()-currentHours*3600000);
  const {data,error}=await sb.from('air_reports').select('*').order('created_at',{ascending:false});
  if(error){ console.error(error); return; }

  let n=0;
  data.forEach(r=>{
    if(new Date(r.created_at)<cutoff) return;
    n++; renderPin(r);
  });
  document.getElementById('reportCount').textContent=n+' '+t('reportCount');
  document.getElementById('updated').textContent=new Date().toLocaleTimeString();
}

/* ═══════════════════════════════════════════════════
   FILTER DROPDOWN
═══════════════════════════════════════════════════ */
function onFilterChange(val){
  if(val.startsWith('h')){
    currentHours=parseInt(val.slice(1));
    currentDays=null;
    loadPinsByHours(currentHours);
  } else {
    currentDays=parseInt(val.slice(1));
    currentHours=null;
    loadPins(currentDays);
  }
}

/* ═══════════════════════════════════════════════════
   REPORT
═══════════════════════════════════════════════════ */
async function reportBadAir(){
  const coords=pinMode&&manualCoords ? manualCoords : userCoords;
  if(!coords){ alert(t('waitGps')); return; }

  const category=document.getElementById('category').value;
  const comment =document.getElementById('comment').value;

  try{
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${coords.lat}&longitude=${coords.lon}&current=wind_speed_10m,wind_direction_10m,pressure_msl`);
    const w=await r.json(); const c=w.current;

    const {error}=await sb.from('air_reports').insert([{
      latitude:coords.lat, longitude:coords.lon,
      category, comment,
      wind_speed:c.wind_speed_10m,
      wind_direction:c.wind_direction_10m,
      sea_level_pressure:c.pressure_msl
    }]);
    if(error) throw error;

    document.getElementById('comment').value='';
    alert(t('submitted'));
    onFilterChange(document.getElementById('filterSelect').value);

  } catch(err){ alert(err.message); }
}

/* ═══════════════════════════════════════════════════
   CSV
═══════════════════════════════════════════════════ */
async function downloadCSV(){
  const {data}=await sb.from('air_reports').select('*');
  if(!data||!data.length) return;
  let csv='ID,Date,Latitude,Longitude,Category,WindSpeed,WindDirection,Pressure,Comment\n';
  data.forEach(r=>{
    csv+=`${r.id},${r.created_at},${r.latitude},${r.longitude},${r.category},${r.wind_speed},${r.wind_direction},${r.sea_level_pressure},"${r.comment||''}"\n`;
  });
  const a=document.createElement('a');
  a.href=encodeURI('data:text/csv;charset=utf-8,'+csv);
  a.download='TraceTheToxin.csv';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
}

setInterval(()=> onFilterChange(document.getElementById('filterSelect').value), 60000);
